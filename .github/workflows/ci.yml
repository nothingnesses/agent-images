name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake show

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix run .#smoke-test

  smoke-test-nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix run .#smoke-test-nix
      - name: Report image size delta
        run: |
          nix build .#opencode -o result-base
          base_size=$(stat -Lc%s result-base)
          nix build .#nix-test-image -o result-nix
          nix_size=$(stat -Lc%s result-nix)
          delta=$(( nix_size - base_size ))
          echo "Base image: $(( base_size / 1048576 )) MB"
          echo "withNix image: $(( nix_size / 1048576 )) MB"
          echo "Delta: $(( delta / 1048576 )) MB"
